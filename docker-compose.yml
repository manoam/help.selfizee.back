services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: help-selfizee-back-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-help}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-help}
      POSTGRES_DB: ${POSTGRES_DB:-help_selfizee}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-help} -d ${POSTGRES_DB:-help_selfizee}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/node.Dockerfile
    container_name: help-selfizee-back-api
    working_dir: /app
    command: sh -c "pnpm prisma generate && pnpm prisma migrate deploy && pnpm dev"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-help}:${POSTGRES_PASSWORD:-help}@postgres:5432/${POSTGRES_DB:-help_selfizee}
      NODE_ENV: development
      PORT: 3001
      KEYCLOAK_URL: ${KEYCLOAK_URL:-https://plateformdev-auth.orkessi.com}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-konitys}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-helpselfizee}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  node_modules:
